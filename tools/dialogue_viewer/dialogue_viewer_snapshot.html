<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Project Chill Dialogue Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f2ec;
      --panel: #fffaf2;
      --panel-strong: #fff5e4;
      --ink: #28231f;
      --muted: #72675e;
      --line: #d9cec0;
      --accent: #2d6c72;
      --accent-2: #9b5739;
      --good: #2c7b57;
      --warn: #aa6b00;
      --bad: #a63d40;
      --shadow: 0 10px 24px rgba(42, 34, 28, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--ink);
      border-radius: 7px;
      padding: 8px 11px;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      border-color: var(--accent);
      outline: none;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.danger {
      border-color: #d7aaa9;
      color: var(--bad);
    }

    input[type="search"],
    input[type="text"],
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fffdf8;
      color: var(--ink);
      padding: 9px 10px;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.5;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    .topbar {
      background: #efe6d8;
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      display: grid;
      gap: 12px;
    }

    .title-row,
    .tools-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 260px;
    }

    .title h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .file-status {
      color: var(--muted);
      font-size: 13px;
    }

    .file-controls,
    .export-controls,
    .mode-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .file-input {
      display: none;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffdf8;
      padding: 7px 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .switch input {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    .main {
      display: grid;
      grid-template-columns: 330px minmax(440px, 1fr) minmax(360px, 520px);
      min-height: 0;
    }

    .sidebar,
    .details,
    .canvas-wrap {
      min-height: 0;
      overflow: auto;
      padding: 16px;
    }

    .sidebar,
    .details {
      background: var(--panel);
    }

    .sidebar {
      border-right: 1px solid var(--line);
    }

    .details {
      border-left: 1px solid var(--line);
    }

    .canvas-wrap {
      background: #fbf7ef;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat {
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }

    .stat strong {
      display: block;
      font-size: 20px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .filters {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .node-list {
      display: grid;
      gap: 8px;
    }

    .node-row {
      border: 1px solid var(--line);
      background: #fffdf8;
      border-radius: 8px;
      padding: 10px;
      display: grid;
      gap: 5px;
      cursor: pointer;
      text-align: left;
    }

    .node-row:hover,
    .node-row.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(45, 108, 114, 0.12);
    }

    .node-id {
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .node-line-preview {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
      max-height: 3.8em;
      overflow: hidden;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #eee5d8;
      color: #584a40;
      padding: 3px 7px;
      font-size: 11px;
      font-weight: 700;
      min-height: 20px;
    }

    .tag.unlock {
      background: #dfefe9;
      color: #1f6148;
    }

    .tag.flag {
      background: #f4e0d6;
      color: #8a4127;
    }

    .tag.warn {
      background: #f6e7bd;
      color: #815400;
    }

    .tag.bad {
      background: #f6dada;
      color: #923034;
    }

    .graph-toolbar,
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .graph-toolbar h2,
    .section-head h2 {
      margin: 0;
      font-size: 18px;
    }

    .graph-controls {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .flow-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .flow-tabs button,
    .flow-tabs select {
      min-height: 38px;
    }

    .flow-tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    .ep-flow-control {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .ep-flow-control select {
      width: auto;
      min-width: 92px;
      padding: 8px 28px 8px 10px;
    }

    .graph-frame {
      overflow: auto;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-height: 480px;
    }

    svg {
      display: block;
    }

    .graph-card {
      width: 100%;
      height: 100%;
      border: 1px solid #cfc0af;
      border-radius: 8px;
      background: #fffaf2;
      padding: 10px;
      overflow: hidden;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 4px;
      pointer-events: none;
    }

    .graph-node.active .graph-card {
      border-color: var(--accent);
      border-width: 3px;
      padding: 8px;
    }

    .graph-node.missing .graph-card {
      background: #fceaea;
      border-color: var(--bad);
    }

    .graph-node.outside .graph-card {
      background: #edf4f4;
      border-color: var(--accent);
      border-style: dashed;
    }

    .graph-node.choice .graph-card {
      background: #f7efe3;
      border-color: var(--accent-2);
    }

    .graph-card-kicker {
      color: var(--accent-2);
      font-size: 10px;
      font-weight: 850;
      line-height: 1.2;
      text-transform: uppercase;
    }

    .graph-card-title,
    .graph-card-preview {
      overflow-wrap: anywhere;
    }

    .graph-card-title {
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
    }

    .graph-card-preview {
      color: var(--muted);
      font-size: 12px;
      font-weight: 650;
      line-height: 1.3;
    }

    .edge {
      stroke: #9e8e7f;
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#arrow);
    }

    .edge.special {
      stroke: var(--accent-2);
      stroke-dasharray: 5 4;
    }

    .detail-card {
      display: grid;
      gap: 12px;
    }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      background: #fffdf8;
      line-height: 1.5;
    }

    .readonly-line {
      white-space: pre-wrap;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      line-height: 1.55;
      min-height: 92px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .choice-table {
      display: grid;
      gap: 8px;
    }

    .choice-row {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fffdf8;
      display: grid;
      gap: 7px;
    }

    .choice-row.changed {
      border-color: var(--accent-2);
      background: #fff4ec;
    }

    .inline-fields {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 1fr);
      gap: 8px;
    }

    .mini-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .review-panel {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 4px;
      display: grid;
      gap: 8px;
    }

    .changes {
      display: grid;
      gap: 8px;
      max-height: 240px;
      overflow: auto;
    }

    .change {
      border: 1px solid #e0c3ac;
      background: #fff3e8;
      border-radius: 8px;
      padding: 9px;
      font-size: 13px;
      display: grid;
      gap: 3px;
    }

    .change strong {
      overflow-wrap: anywhere;
    }

    .compare {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .compare pre {
      margin: 0;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px;
      background: #fffdf8;
      font-size: 12px;
      line-height: 1.4;
    }

    .warning-list {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .warning-item {
      border: 1px solid #ead59c;
      border-radius: 8px;
      background: #fff8dd;
      color: #6f4a00;
      padding: 8px 10px;
      font-size: 13px;
      line-height: 1.35;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1200px) {
      .main {
        grid-template-columns: 300px 1fr;
      }

      .details {
        grid-column: 1 / -1;
        border-left: none;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 760px) {
      .main {
        grid-template-columns: 1fr;
      }

      .sidebar,
      .details {
        border: none;
        border-top: 1px solid var(--line);
      }

      .field-grid,
      .inline-fields,
      .compare {
        grid-template-columns: 1fr;
      }
    }

    @media print {
      .topbar,
      .sidebar,
      .graph-toolbar,
      button,
      input,
      select,
      textarea {
        display: none !important;
      }

      .main {
        display: block;
      }

      .canvas-wrap,
      .details {
        overflow: visible;
        border: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="title-row">
        <div class="title">
          <h1>Dialogue Viewer</h1>
          <span id="fileStatus" class="file-status">No script loaded</span>
        </div>
        <div class="file-controls">
          <input id="scriptFileInput" class="file-input" type="file" accept=".json,application/json">
          <input id="reactiveFileInput" class="file-input" type="file" accept=".json,application/json">
          <button id="loadScriptButton" class="primary">Load scripted_nodes.json</button>
          <button id="loadReactiveButton">Load reactive_lines.json</button>
          <button id="tryRepoButton">Try repo auto-load</button>
        </div>
      </div>
      <div class="tools-row">
        <div class="mode-controls">
          <label class="switch" title="Enable editable fields and change tracking">
            <input id="reviewModeToggle" type="checkbox">
            Review mode
          </label>
          <label class="switch" title="Show original and edited text side by side">
            <input id="compareToggle" type="checkbox" checked>
            Compare changes
          </label>
        </div>
        <div class="export-controls">
          <button id="exportJsonButton">Export revised JSON</button>
          <button id="exportNotesButton">Export review notes</button>
          <button id="exportSnapshotButton">Export shareable HTML</button>
          <button id="clearChangesButton" class="danger">Clear review changes</button>
        </div>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <section class="stats" aria-label="Script stats">
          <div class="stat"><strong id="statNodes">0</strong><span>nodes</span></div>
          <div class="stat"><strong id="statLinks">0</strong><span>links</span></div>
          <div class="stat"><strong id="statUnlocks">0</strong><span>unlocks</span></div>
          <div class="stat"><strong id="statIssues">0</strong><span>issues</span></div>
        </section>

        <section id="warningList" class="warning-list"></section>

        <section class="filters">
          <div>
            <label for="searchInput">Search</label>
            <input id="searchInput" type="search" placeholder="Node id, text, tag, choice">
          </div>
          <div>
            <label for="filterSelect">Filter</label>
            <select id="filterSelect">
              <option value="all">All nodes</option>
              <option value="unlock">Has unlock gate</option>
              <option value="flags">Sets flags</option>
              <option value="missing">Links to missing node</option>
              <option value="orphan">Not reached by another node</option>
              <option value="ai">AI or action target</option>
              <option value="changed">Changed in review</option>
            </select>
          </div>
        </section>

        <section id="nodeList" class="node-list" aria-label="Dialogue nodes"></section>
      </aside>

      <section class="canvas-wrap">
        <div class="graph-toolbar">
          <h2>Conversation Flow</h2>
          <div class="mini-actions">
            <button id="fitGraphButton">Fit view</button>
            <button id="copyMermaidButton">Copy Mermaid</button>
          </div>
        </div>
        <div class="graph-controls">
          <div id="flowTabs" class="flow-tabs" aria-label="Flow type">
            <button type="button" data-flow-type="all">All</button>
            <span class="ep-flow-control">
              <button id="epFlowButton" type="button" data-flow-type="episode">EP</button>
              <select id="episodeSelect" aria-label="Episode"></select>
            </span>
            <button type="button" data-flow-type="idle">Idle</button>
            <button type="button" data-flow-type="greeting">Greeting</button>
            <button type="button" data-flow-type="focus">Focus</button>
            <button type="button" data-flow-type="return">Return</button>
            <button type="button" data-flow-type="exit">Exit</button>
            <button type="button" data-flow-type="action">Action / AI</button>
          </div>
        </div>
        <div id="graphFrame" class="graph-frame">
          <div class="empty">Load `data/dialogue/scripted_nodes.json` to see the conversation map.</div>
        </div>
      </section>

      <aside class="details">
        <div class="section-head">
          <h2>Node Details</h2>
          <div class="mini-actions">
            <button id="revertNodeButton">Revert node</button>
          </div>
        </div>
        <section id="detailPane" class="detail-card">
          <div class="empty">Select a node to inspect line text, choices, unlock gates, flags, and review changes.</div>
        </section>
      </aside>
    </main>
  </div>

  <script id="embedded-scripted" type="application/json">{"_doc":"Co-presence-first script, slow burn. Ep0 = intro (intro_node). Ep1-Ep14 reveal one-per-completed-focus via EPISODE_START_NODES (epNN_01). Each episode: Yua opens (a few beats) -> in-character player choices (reflective/topical, NEVER session-management) -> Yua's branched reply (a few beats) -> terminal (settle back to co-presence; player runs as many focus sessions as they like via the timer UI, Yua never 'ends' a session). Type input = a choice whose next is an AI_MODE_* id (flips Type Mode on, stores message to memory). {focus_minutes} in ep01_01 choice 1 is an ENGINE token: substitute with the just-completed focus length in minutes (fallback: strip it). Functional nodes (idle, TASK_INPUT_*, FOCUS_*, ABORT_*, return_*, greeting_*, EXIT_*) preserved. ENGINE: episodes are now flag-guarded (seen_flag + optional unlock.total_focus_seconds_min); see _pacing_doc. DEMO_SCRIPT_VERSION is 8.","fallback_id":"idle","intro_node":"ep00_01","demo_script_version":8,"_pacing_doc":"Episodes are flag-guarded: each fires once when completed_focus_count >= session_gate AND its unlock is satisfied AND its seen_flag is not yet set (lowest unmet gate first). The matching epNN_01 node carries set_flags:[\"epNN_seen\"]. Casual chats are count-only; writing/relationship beats add unlock.total_focus_seconds_min so short (3s test) sessions can't speed-run intimacy — real 15-45min sessions clear these naturally. TUNE pacing here: raise/lower total_focus_seconds_min (in seconds) per beat. When no episode is eligible, the engine falls back to FOCUS_DONE_REPEAT.","episodes":[{"id":"ep01","label":"Ep 1 · 第一段","start_node":"ep01_01","session_gate":1,"seen_flag":"ep01_seen"},{"id":"ep02","label":"Ep 2 · 放点什么","start_node":"ep02_01","session_gate":2,"seen_flag":"ep02_seen"},{"id":"ep03","label":"Ep 3 · 坐不住","start_node":"ep03_01","session_gate":3,"seen_flag":"ep03_seen"},{"id":"ep04","label":"Ep 4 · 换换脑子","start_node":"ep04_01","session_gate":4,"seen_flag":"ep04_seen"},{"id":"ep05","label":"Ep 5 · 我也写点东西","start_node":"ep05_01","session_gate":5,"seen_flag":"ep05_seen","unlock":{"total_focus_seconds_min":1500}},{"id":"ep06","label":"Ep 6 · 写不动","start_node":"ep06_01","session_gate":6,"seen_flag":"ep06_seen","unlock":{"total_focus_seconds_min":2400}},{"id":"ep07","label":"Ep 7 · 喜欢的词","start_node":"ep07_01","session_gate":7,"seen_flag":"ep07_seen"},{"id":"ep08","label":"Ep 8 · 灵感","start_node":"ep08_01","session_gate":8,"seen_flag":"ep08_seen","unlock":{"total_focus_seconds_min":3600}},{"id":"ep09","label":"Ep 9 · 拖延","start_node":"ep09_01","session_gate":9,"seen_flag":"ep09_seen"},{"id":"ep10","label":"Ep 10 · 习惯你在","start_node":"ep10_01","session_gate":10,"seen_flag":"ep10_seen","unlock":{"total_focus_seconds_min":5400}},{"id":"ep11","label":"Ep 11 · 划掉那一下","start_node":"ep11_01","session_gate":11,"seen_flag":"ep11_seen"},{"id":"ep12","label":"Ep 12 · 敢读回去","start_node":"ep12_01","session_gate":12,"seen_flag":"ep12_seen","unlock":{"total_focus_seconds_min":7200}},{"id":"ep13","label":"Ep 13 · 记得你","start_node":"ep13_01","session_gate":13,"seen_flag":"ep13_seen","unlock":{"total_focus_seconds_min":9000}},{"id":"ep14","label":"Ep 14 · 固定搭子","start_node":"ep14_01","session_gate":14,"seen_flag":"ep14_seen","unlock":{"total_focus_seconds_min":10800}}],"nodes":[{"id":"idle","line":"（她在忙自己的事。想说话，点一下她。）","choices":[]},{"id":"ep00_01","line":"……这个绿灯亮着，是匹配上了吧。\n\n还是说，还在转？","choices":[{"text":"……","next":"ep00_02"}]},{"id":"ep00_02","line":"诶？——\n\n……啊，真的连上了。\n\n不好意思，我刚才一直在确认麦克风那个小图标，没注意到画面已经通了。","choices":[{"text":"继续","next":"ep00_03"}]},{"id":"ep00_03","line":"这个软件我也是第一次用。\n\n听朋友说，它会帮你匹配一个人，然后就这样开着，各做各的事。\n\n据说比一个人闷头做，容易坚持一点。\n\n……第一次真的匹配到人，还有点紧张。","choices":[{"text":"继续","next":"ep00_features"}]},{"id":"ep00_features","line":"对了——我刚才等的时候，随手点了一圈。\n\n右上角是计时器。专注的话开一段，几分钟到几十分钟自己挑——时间到了它会提醒你。\n\n旁边可以记一两件想做的事。懒得写的话，直接开计时也行。\n\n还有背景音乐，不喜欢随时能关。\n\n……大概就这些了。应该用着用着就知道了。","choices":[{"text":"继续","next":"ep00_nervous"}]},{"id":"ep00_nervous","line":"诶，说来也怪——\n\n本来以为对着一个陌生人会一直紧张，结果……好像没有我想的那么难受。\n\n你呢？","choices":[{"text":"嗯，还行","next":"ep00_nervous_ok"},{"text":"有点紧张","next":"ep00_nervous_tense"}]},{"id":"ep00_nervous_ok","line":"那就好，我也松了口气。\n\n……那，先认识一下吧。","choices":[{"text":"继续","next":"ep00_name"}]},{"id":"ep00_nervous_tense","line":"没事，才刚开始嘛，慢慢来。\n\n……先认识一下吧。","choices":[{"text":"继续","next":"ep00_name"}]},{"id":"ep00_name","line":"我叫 Yua。\n\n你呢？我该怎么称呼你？\n\n（在下面取个昵称就行，随便都好。）","choices":[{"text":"（取好了）","next":"ep00_close"}],"speaker":"yua","tags":["intro","name_input"]},{"id":"ep00_close","line":"{name}，记住啦。\n\n……那，要不先试一下那个计时器？\n\n你定个时长——我这边也开始了。就先这样，各做各的。","choices":[],"set_flags":["intro_seen"],"speaker":"yua","tags":["intro","co_presence"]},{"id":"ep01_01","set_flags":["ep01_seen"],"line":"……响了。\n\n我刚好把光标停在一句还算能看的地方，今天运气不错。\n\n你先缓口气，{name}，不用急着回答我——刚才那一段，对你来说还好吗？","choices":[{"text":"很充实，这 {focus_minutes} 分钟值了！","next":"ep01_a"},{"text":"还行吧，普普通通","next":"ep01_b"},{"text":"有点分神，没太坐住……","next":"ep01_c"}],"speaker":"yua","tags":["episode","co_presence"]},{"id":"ep01_a","line":"那就好。\n\n说实话，我本来还担心，第一次通话要是一直安静着，会不会很尴尬。\n\n结果一点也不会——有你在，反而比硬找话说自在多了。\n\n……这种感觉挺好的。先歇着，我不催你。","choices":[]},{"id":"ep01_b","line":"普通就普通，普通也很好啊。\n\n又不是每段都得轰轰烈烈的——能坐下来本身，就已经算数了。\n\n……歇会儿，回头想再来一段，我都在。","choices":[]},{"id":"ep01_c","line":"哈，没事，谁还没个走神的时候。\n\n我刚才也对着窗外发了好一会儿呆，咱俩半斤八两。\n\n这一段不用打分的——你来了，坐下了，就已经很好。\n\n……下段想试就试，不想也没关系。","choices":[]},{"id":"ep02_01","set_flags":["ep02_seen"],"line":"对了，问你个事——\n\n你做事的时候，会放点背景音吗？音乐，或者把什么节目、视频开着当个响动。\n\n我一个人的时候老开着电台，其实根本没在听，就图个屋里“有人声”。\n\n你是哪种？","choices":[{"text":"我也爱放点音乐","next":"ep02_a"},{"text":"我得绝对安静","next":"ep02_b"},{"text":"看心情，随缘","next":"ep02_c"}],"speaker":"yua","tags":["episode"]},{"id":"ep02_a","line":"哈，同道中人。\n\n不过我那电台有个毛病——一遇上好笑的段子，我能直接笑到把正事忘干净。\n\n（笑）所以说还是现在这样好：有你这么个安静的人在，我反而压得住，能老老实实做事。","choices":[]},{"id":"ep02_b","line":"绝对安静派，我懂。\n\n那种连风扇声都嫌吵、整个世界静下来才钻得进去的感觉，对吧？\n\n行，那我把动静收着点。\n\n……这样的安静里有个人在，其实挺踏实的。","choices":[]},{"id":"ep02_c","line":"哈，随缘——\n\n那就今天看情况好了。\n\n（小声）反正有人陪着，好像灵活一点也无所谓。","choices":[]},{"id":"ep03_01","set_flags":["ep03_seen"],"line":"说真的，我特别容易分心。\n\n本来打算坐下好好干，结果一抬头，半小时没了，啥也没干成，光在那儿神游。\n\n所以我才想试试这个——身边有个人，哪怕隔着屏幕、谁也不说话，好像就没那么容易飘走。\n\n你也是这种坐不住的人吗？","choices":[{"text":"我也坐不住","next":"ep03_a"},{"text":"我还行，能坐住","next":"ep03_b"}],"speaker":"yua","tags":["episode"]},{"id":"ep03_a","line":"哈，那我们俩正好凑一对。\n\n说好听点叫「互相陪伴」……说白了，就是俩坐不住的人互相拽着别跑。\n\n……行，说定了。","choices":[]},{"id":"ep03_b","line":"真好，我有点羡慕。\n\n那我蹭一蹭你这股定力——说不定还能传染给我呢。\n\n……别嫌我赖着你啊。","choices":[]},{"id":"ep04_01","set_flags":["ep04_seen"],"line":"你卡壳的时候，都怎么熬过去的？\n\n我一卡住就坐不住，非得起来弄点别的——泡杯热的、发会儿呆，或者把桌子擦一遍，明明它根本没乱。\n\n弄完一圈回来，有时候那个卡着的地方，自己就松开了。\n\n你呢，有什么自己的招？","choices":[{"text":"我说说我的办法（自己写）","next":"AI_MODE_BREAK_CHAT"},{"text":"我也是起来晃一圈","next":"ep04_a"},{"text":"硬扛，扛过去就好了","next":"ep04_b"}],"speaker":"yua","tags":["episode"]},{"id":"ep04_a","line":"对吧！晃一圈再回来，常常就通了。\n\n大脑这东西，你越逼它越死机，松一松反倒想起来了。\n\n行，被我念叨这么久，快回去——我也继续了。","choices":[]},{"id":"ep04_b","line":"硬扛派……强。\n\n我扛不住，一扛就开始怀疑人生。\n\n不过你这样也好，认准了就闷头穿过去。\n\n我在边上陪着你——真扛不动了，记得喊我一声。","choices":[]},{"id":"ep05_01","line":"刚才你专注的时候，我也没闲着——\n\n跟你说个小秘密：我私下，会写点东西。\n\n不是什么正经大作，就自己瞎写，写两行删一行，连文件名都起得乱七八糟、见不得人。\n\n……诶，我好像还没跟你提过这个。说出来还怪不好意思的。","choices":[{"text":"写的是什么？","next":"ep05_a"},{"text":"挺好的，慢慢写","next":"ep05_b"}],"set_flags":["writing_disclosed","ep05_seen"],"speaker":"yua","tags":["episode","writing"]},{"id":"ep05_a","line":"……内容先保密。\n\n不是故意吊你胃口——是我一旦说出口，就会突然觉得它特别需要被删掉。\n\n等它胆子大一点，或者……等我胆子大一点，再给你看一小段。\n\n现在，先让它在那儿待着吧。","choices":[]},{"id":"ep05_b","line":"嗯……被你这么轻飘飘一句“慢慢写”，我心里反而松了一下。\n\n对，不急。\n\n反正有人陪着，一行一行地，总能往前挪。","choices":[]},{"id":"ep06_01","set_flags":["ep06_seen"],"line":"今天那点东西，又卡死了。\n\n明明昨天还顺得飞起，今天对着它，一个字都不想动，光想逃。\n\n你做事会不会也这样——越是看重、越想做好的东西，反而越下不去手？","choices":[{"text":"会，太懂了","next":"ep06_a"},{"text":"别跟它较劲，先放着","next":"ep06_b"}],"speaker":"yua","tags":["episode","writing"]},{"id":"ep06_a","line":"哈，那我就不孤单了。\n\n原来不是我一个人这么拧巴。\n\n……行，那今天不硬憋了，就陪你这么坐着——坐着坐着，说不定它自己就松口了。","choices":[]},{"id":"ep06_b","line":"……你说得对。\n\n我老想着“今天必须搞定它”，结果越逼越糟。\n\n放着放着，明天再看，也许就没那么吓人了。\n\n谢啦，被你一说，我这口气总算松下来了。","choices":[]},{"id":"ep07_01","set_flags":["ep07_seen"],"line":"跟你说个我的怪癖——\n\n有些词，我会反复在嘴里念，不为什么，就觉得念着顺口、心里舒服。\n\n比如“余白”，比如“松弛”……念出来，好像整个人都慢下来了。\n\n你有没有那种，明明没什么用、但就是莫名偏爱的词？","choices":[{"text":"有，我告诉你一个（自己写）","next":"AI_MODE_BREAK_CHAT"},{"text":"没想过，但好像挺有意思","next":"ep07_a"}],"speaker":"yua","tags":["episode"]},{"id":"ep07_a","line":"哈，那你留意一下——\n\n下次哪个词从你嘴里冒出来、你心里“咯噔”喜欢了一下，就记住它。\n\n想到了随时丢给我，我专门收集这种。\n\n……行，不耽误你了，继续。","choices":[]},{"id":"ep08_01","set_flags":["ep08_seen"],"line":"诶，跟你说件怪事。\n\n刚才你在专注，我也在写——结果脑子里突然蹦出来一句，还挺不错的，我自己都愣了一下。\n\n说来也奇怪：一个人空想的时候死活憋不出来，旁边一有人安安静静做事，它反倒自己就来了。\n\n……所以今天这句，算你一半功劳。","choices":[{"text":"那你可得请客","next":"ep08_a"},{"text":"我啥也没做啊","next":"ep08_b"}],"speaker":"yua","tags":["episode","writing"]},{"id":"ep08_a","line":"……才没有那么正式。\n\n不过……如果那天真的写成了——你是会知道的，我大概会忍不住跟你说。\n\n先把这句记下来，别让它跑了。","choices":[]},{"id":"ep08_b","line":"你就是“啥也没做”地坐在那儿，这才是关键啊。\n\n那种“有人在”的安静，比什么灵感咒语都管用。\n\n……总之，谢了。这句我留着了。","choices":[]},{"id":"ep09_01","set_flags":["ep09_seen"],"line":"老实跟你交代——我昨天一整天，啥正事没干。\n\n说好要做的全堆着，然后越堆越不敢看，越不敢看就越堆，活生生一个恶性循环。\n\n那种明明很闲、心里却一直坠着块石头的感觉，你懂吗？","choices":[{"text":"太懂了，天天如此","next":"ep09_a"},{"text":"我还好，不太拖","next":"ep09_b"}],"speaker":"yua","tags":["episode"]},{"id":"ep09_a","line":"（叹气）抱抱，同病相怜。\n\n不过你看，你今天到底还是来了，还坐了一段——这就比昨天的我强多了。\n\n咱也别想着一口气还清，先做一点点，哪怕一点点。\n\n有你在，我好像没那么想逃了。","choices":[]},{"id":"ep09_b","line":"哇，不拖延的人……我得好好观察观察你。\n\n那今天我就向你看齐，少废话，先动起来再说。\n\n……你坐着别动啊，让我沾点你这股劲儿。","choices":[]},{"id":"ep10_01","set_flags":["ep10_seen"],"line":"说起来，我好像有点习惯你在了。\n\n以前最怕被人看着做事，浑身不自在，手都不知道往哪儿放。\n\n现在倒好，你在那头各做各的，我这边反而踏实，坐得下去。\n\n大概因为你从不盯着我、也不催我——这种“在，但不打扰”的距离，对我刚刚好。","choices":[{"text":"我也习惯有你在了","next":"ep10_a"},{"text":"那就多来陪你坐坐","next":"ep10_b"}],"speaker":"yua","tags":["episode","co_presence"]},{"id":"ep10_a","line":"……嘿。\n\n那看来我们俩，是真处成习惯了。\n\n挺好。习惯这东西，比一时的热闹靠得住。","choices":[]},{"id":"ep10_b","line":"哈，那我可记下了啊。\n\n不用特意，你忙你的，顺路来坐坐就行。\n\n反正这个位置，给你留着。","choices":[]},{"id":"ep11_01","set_flags":["ep11_seen"],"line":"问你个事——把一件拖了超久的事，终于划掉的那一瞬间，你懂那种感觉吗？\n\n不是什么惊天动地的大事，就是心里“咔”地，松开一小块。\n\n我今天就划掉了一件。小小的、不起眼的一件。\n\n嗯……就是突然特别想跟个人说一声。你正好在。","choices":[{"text":"我最近也划掉过（自己写）","next":"AI_MODE_BREAK_CHAT"},{"text":"替你高兴","next":"ep11_a"}],"speaker":"yua","tags":["episode"]},{"id":"ep11_a","line":"嘿嘿，谢啦。\n\n这种小事，跟人说了，那点高兴好像就翻了个倍。\n\n行，趁这股劲儿——咱再去划掉下一件，你也是。","choices":[]},{"id":"ep12_01","set_flags":["ep12_seen"],"line":"今天干了件平时打死不敢干的事——\n\n我把之前写的那些，从头到尾读了一遍。\n\n往常我读两行就脸红，恨不得当场全删掉、假装没写过。\n\n可今天……我居然一句句读完了。不是说写得有多好，就是，没像以前那样落荒而逃。","choices":[{"text":"这就是进步啊","next":"ep12_a"},{"text":"能读完已经很勇敢了","next":"ep12_b"}],"speaker":"yua","tags":["episode","writing"]},{"id":"ep12_a","line":"……是吧？\n\n我也偷偷觉得，这算往前挪了一小步。\n\n以前是连看都不敢看，现在至少敢正眼瞧它了。\n\n谢谢你这么说，我心里那点小得意，总算有处放了。","choices":[]},{"id":"ep12_b","line":"勇敢……这词用在读自己写的东西上，听着是有点好笑。\n\n可你还真说对了——对我来说，那确实需要鼓起一点勇气。\n\n（小声）有人在旁边，这点勇气好像就更容易凑出来。","choices":[]},{"id":"ep13_01","set_flags":["ep13_seen"],"line":"说起来，{name}，我们好像处出一点固定的节奏了。\n\n不是发生了什么大事——就是你来、我们各自安静一会儿、偶尔聊两句。\n\n（笑）当搭子嘛，慢慢就熟了，这种小小的熟悉感，我还挺喜欢的。\n\n你最近怎么样？想说什么我都听着；你说的，我也会接着替你记住。","choices":[{"text":"那我跟你说说近况（自己写）","next":"AI_MODE_BREAK_CHAT"},{"text":"有你这么个搭子，挺好的","next":"ep13_a"}],"speaker":"yua","tags":["episode","memory"]},{"id":"ep13_a","line":"……嗯。\n\n这种不用刻意维持、又确实在的关系，挺难得的。\n\n往后你想说的，我也会接着记着——不勉强，你愿意说我才听。\n\n嗯，就这么待着挺好。","choices":[]},{"id":"ep14_01","set_flags":["ep14_seen"],"line":"诶，你发现没有——不知不觉，我们这样坐了好多回了。\n\n刚开始我还会偷偷检查，自己是不是显得太尴尬、太僵。\n\n现在呢，看到你这边亮起来，我就会很自然地把文档和水杯都摆好，准备一起待一会儿。\n\n（笑）你大概已经成了我的“固定安静席位”了……这称呼是不是有点怪？","choices":[{"text":"多关照（自己写）","next":"AI_MODE_BREAK_CHAT"},{"text":"我也喜欢这种固定的安静","next":"ep14_a"}],"speaker":"yua","tags":["episode","co_presence"]},{"id":"ep14_a","line":"那就先不改名了。\n\n你忙你的，我忙我的——偶尔一抬头，知道对方还在，就够了。\n\n这样的搭子，不吵也不黏，却一直都在。挺好。","choices":[]},{"id":"TASK_INPUT_001","line":"想给这一段定个小目标也行。\n\n在下面写一句就好，不写也完全没关系。","choices":[{"text":"先用示例任务体验","next":"ACTION_DEMO_TASK"},{"text":"帮我把它说小一点","next":"AI_MODE_TASK_CLARIFY"}]},{"id":"TASK_INPUT_002","line":"嗯，收到。\n\n计时多长你自己定，撑得住就行，不用挑最长的那个。","choices":[{"text":"3 秒试玩","next":"ACTION_SET_TIMER_1"},{"text":"15 分钟","next":"ACTION_SET_TIMER_15"},{"text":"25 分钟","next":"ACTION_SET_TIMER_25"},{"text":"45 分钟","next":"ACTION_SET_TIMER_45"}]},{"id":"FOCUS_READY_001","line":"好。\n\n准备好就开始，不急。","choices":[{"text":"开始","next":"ACTION_START_FOCUS"},{"text":"换一个","next":"TASK_INPUT_001"}]},{"id":"FOCUS_START_001","line":"那我也开始我的。\n\n……你做你的就好。\n\n中途想看我也行，不过我大概会一直盯着自己屏幕。","choices":[]},{"id":"FOCUS_DONE_REPEAT","line":"又一段，收工。\n\n我们俩都往前挪了一点点——这种一起挪的感觉，我怎么都待不腻。\n\n刚才那阵子，你自己感觉怎么样？","choices":[{"text":"挺充实的","next":"FOCUS_DONE_a"},{"text":"还可以吧","next":"FOCUS_DONE_b"},{"text":"有点没坐住","next":"FOCUS_DONE_c"}]},{"id":"FOCUS_DONE_a","line":"那就值了。\n\n趁这股劲儿，想接着来就接着来；想歇会儿也行——我都在。","choices":[]},{"id":"FOCUS_DONE_b","line":"还可以就很好啊，又不用每段都拼命。\n\n能坐下来本身就算数。歇够了，招呼我一声。","choices":[]},{"id":"FOCUS_DONE_c","line":"没事，谁都有坐不住的时候，我也常这样。\n\n人在这儿，就比躲着强。下段想试再试，不急。","choices":[]},{"id":"ABORT_001","line":"停下来了？\n\n没事。\n\n计时器停了，不代表什么别的。就是停了而已。","choices":[{"text":"先坐一会儿","next":"ABORT_REST"},{"text":"今天先离开","next":"EXIT_ABORT"}]},{"id":"ABORT_REST","line":"嗯，先放着。\n\n想说会儿话也行，想静一静也行。\n\n我都在。","choices":[{"text":"说会儿话","next":"AI_MODE_BREAK_CHAT"},{"text":"先离开","next":"EXIT_ABORT"}]},{"id":"return_open_short","line":"诶，又是你。\n\n……这次我没那么手忙脚乱了。\n\n你随意，我也继续。","choices":[]},{"id":"return_open_01","line":"诶，来了。\n\n……我刚把文档打开，正要开始。","choices":[]},{"id":"greeting_morning_01","line":"早。\n\n这个点能坐下来，已经不容易了。","choices":[]},{"id":"greeting_morning_02","line":"早上好。\n\n我刚泡了热水……你来了，那一起。","choices":[]},{"id":"greeting_morning_03","line":"诶，早。\n\n睡够了吗……我反正没有。","choices":[]},{"id":"greeting_noon_01","line":"中午了。\n\n……这个时候的日光太白了，总让我有点无处安放。\n\n也来一起坐坐？","choices":[]},{"id":"greeting_noon_02","line":"你来了。\n\n这个点我也不太想一个人待着。","choices":[]},{"id":"greeting_noon_03","line":"嗯，午间场。\n\n不用太用力，待着就好。","choices":[]},{"id":"greeting_evening_01","line":"傍晚了。\n\n这个时候的光我挺喜欢的。","choices":[]},{"id":"greeting_evening_02","line":"诶，来了。\n\n白天怎么样，我不问。坐下就行。","choices":[]},{"id":"greeting_evening_03","line":"傍晚这个气氛，挺适合安静做事的。\n\n不知道为什么。","choices":[]},{"id":"greeting_night_01","line":"这个点还来的人，我大概跟你是同类。\n\n……不评判。","choices":[]},{"id":"greeting_night_02","line":"夜里挺安静的。\n\n我喜欢这种安静。","choices":[]},{"id":"greeting_night_03","line":"晚上好。\n\n别熬太狠，做一小段也算。","choices":[]},{"id":"quiet_end_01","line":"嗯，那就先这样静一会儿。\n\n我在这边，不吵你。","choices":[]},{"id":"EXIT_001","line":"好，先这样。\n\n……下次还是我在这里。\n\n嗯。下次。","choices":[]},{"id":"EXIT_DONE","line":"好，今天到这里。\n\n你来过、坐过，这就算数了。\n\n下次见。","choices":[]},{"id":"EXIT_ABORT","line":"去吧。\n\n断掉的是计时器，不是你。\n\n下次还是我，我们接着来。","choices":[]},{"id":"EXIT_NIGHT","line":"挺晚了。\n\n今天能做的做了，剩下的明天再说。\n\n早点睡。我也差不多要收了。","choices":[]}]}</script>
  <script id="embedded-reactive" type="application/json">{"_doc":"Short reactive line pools. Add new categories by adding a new key with a string array. Categories used by main_scene.gd: focus_click. Future C deliverable will add: status_idle, status_morning, status_noon, status_evening, status_night, break_start, break_mid, break_end, action_water, action_glasses, action_window, action_typing_pause.","focus_click":["还差一会儿，再撑一下。","我也在。","别看我，去看你的屏幕。","……你是分心了还是确认我在？好，我在。","快了快了，时间真的在走的。","先别想别的事，那个等一会儿再说。","中间分心是正常的，回来就行。","不用做完，先往前推一点。","我假装没看见你点我。你继续。","来都来了，再做一小块。","比你想象中过得快的，我保证。","就算开始发呆了，也算在状态里。","手边那件事，先做一步。","好的，我知道你需要一点陪伴。行，但你还是要继续。","计时器没停，你也别停。","就快了，别现在放弃。","坐着不动也行，但眼睛看屏幕。","你刚才肯定想到别的事了。放一边，等计时器响。","很好，你还在。","这一段搞完，后面就轻松了。","不需要状态很好，动着就行。","时间还有，但也不多了。刚好。","……点我干嘛。算了，你继续吧。"]}</script>

  <script>
    const state = {
      sourceName: "",
      reactiveSourceName: "",
      originalScript: null,
      workingScript: null,
      originalNodes: new Map(),
      workingNodes: new Map(),
      reactiveLines: null,
      selectedId: "",
      graphType: "all",
      reviewMode: false,
      compareMode: true,
      issues: [],
      inbound: new Map(),
      outgoing: new Map(),
      changes: new Map(),
      comments: new Map()
    };

    const els = {
      fileStatus: document.getElementById("fileStatus"),
      scriptFileInput: document.getElementById("scriptFileInput"),
      reactiveFileInput: document.getElementById("reactiveFileInput"),
      loadScriptButton: document.getElementById("loadScriptButton"),
      loadReactiveButton: document.getElementById("loadReactiveButton"),
      tryRepoButton: document.getElementById("tryRepoButton"),
      reviewModeToggle: document.getElementById("reviewModeToggle"),
      compareToggle: document.getElementById("compareToggle"),
      exportJsonButton: document.getElementById("exportJsonButton"),
      exportNotesButton: document.getElementById("exportNotesButton"),
      exportSnapshotButton: document.getElementById("exportSnapshotButton"),
      clearChangesButton: document.getElementById("clearChangesButton"),
      statNodes: document.getElementById("statNodes"),
      statLinks: document.getElementById("statLinks"),
      statUnlocks: document.getElementById("statUnlocks"),
      statIssues: document.getElementById("statIssues"),
      warningList: document.getElementById("warningList"),
      searchInput: document.getElementById("searchInput"),
      filterSelect: document.getElementById("filterSelect"),
      flowTabs: document.getElementById("flowTabs"),
      epFlowButton: document.getElementById("epFlowButton"),
      episodeSelect: document.getElementById("episodeSelect"),
      nodeList: document.getElementById("nodeList"),
      graphFrame: document.getElementById("graphFrame"),
      fitGraphButton: document.getElementById("fitGraphButton"),
      copyMermaidButton: document.getElementById("copyMermaidButton"),
      detailPane: document.getElementById("detailPane"),
      revertNodeButton: document.getElementById("revertNodeButton")
    };

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function cleanText(value) {
      return String(value || "").replace(/\\n/g, "\n");
    }

    function oneLine(value) {
      return cleanText(value).replace(/\s+/g, " ").trim();
    }

    function isSpecialTarget(id) {
      return /^(AI_MODE_|ACTION_|EXIT)/.test(String(id || ""));
    }

    function nodeLabel(node) {
      return node && node.id ? node.id : "(missing id)";
    }

    function describeUnlock(unlock) {
      if (!unlock) return "";
      if (typeof unlock === "string") return unlock;
      if (Array.isArray(unlock)) return unlock.join(", ");
      if (typeof unlock === "object") {
        return Object.entries(unlock).map(([key, value]) => key + ": " + JSON.stringify(value)).join(", ");
      }
      return String(unlock);
    }

    function describeFlags(node) {
      const pieces = [];
      if (Array.isArray(node.set_flags)) pieces.push(node.set_flags.join(", "));
      if (node.set_flag) pieces.push(JSON.stringify(node.set_flag));
      return pieces.filter(Boolean).join(", ");
    }

    function getNodes(script) {
      return Array.isArray(script && script.nodes) ? script.nodes : [];
    }

    function nodeSearchHaystack(node) {
      const choices = Array.isArray(node.choices) ? node.choices : [];
      return [
        node.id,
        node.speaker,
        node.line,
        Array.isArray(node.tags) ? node.tags.join(" ") : "",
        describeUnlock(node.unlock),
        describeFlags(node),
        choices.map(choice => [choice.text, choice.next].join(" ")).join(" ")
      ].join(" ").toLowerCase();
    }

    function getEpisodeKey(id) {
      const match = String(id || "").match(/^ep(\d{2})_/);
      return match ? "episode:" + match[1] : "";
    }

    function getGraphTypeLabel(type) {
      if (type === "all") return "All flow";
      if (type.startsWith("episode:")) return "EP" + type.split(":")[1];
      const labels = {
        idle: "Idle",
        greeting: "Greeting",
        focus: "Focus / task",
        return: "Return",
        exit: "Exit",
        action: "Action / AI"
      };
      return labels[type] || type;
    }

    function getNodeGraphTypes(node) {
      const id = String(node && node.id || "");
      const types = new Set();
      const episode = getEpisodeKey(id);
      if (episode) types.add(episode);
      if (id === "idle" || id.includes("quiet") || id.includes("idle")) types.add("idle");
      if (id.startsWith("greeting_")) types.add("greeting");
      if (id.startsWith("return_")) types.add("return");
      if (id.startsWith("EXIT")) types.add("exit");
      if (id.includes("TASK") || id.includes("FOCUS") || id.includes("ABORT")) types.add("focus");
      if ((state.outgoing.get(id) || []).some(isSpecialTarget)) types.add("action");
      if (isSpecialTarget(id)) types.add("action");
      return types;
    }

    function passesGraphType(node) {
      if (state.graphType === "all") return true;
      return getNodeGraphTypes(node).has(state.graphType);
    }

    function renderGraphTypeOptions() {
      const current = state.graphType;
      const types = new Set(["all"]);
      for (const node of getNodes(state.workingScript)) {
        for (const type of getNodeGraphTypes(node)) types.add(type);
      }

      const episodes = Array.from(types).filter(type => type.startsWith("episode:")).sort();
      els.episodeSelect.innerHTML = "";
      for (const type of episodes) {
        const option = document.createElement("option");
        option.value = type;
        option.textContent = getGraphTypeLabel(type);
        els.episodeSelect.appendChild(option);
      }

      const hasEpisodes = episodes.length > 0;
      els.epFlowButton.disabled = !hasEpisodes;
      els.episodeSelect.disabled = !hasEpisodes;

      state.graphType = types.has(current) ? current : "all";
      if (state.graphType.startsWith("episode:")) {
        els.episodeSelect.value = state.graphType;
      } else if (hasEpisodes) {
        els.episodeSelect.value = episodes[0];
      }
      updateFlowButtons();
    }

    function updateFlowButtons() {
      for (const button of els.flowTabs.querySelectorAll("button[data-flow-type]")) {
        const type = button.dataset.flowType;
        const active = type === "episode" ? state.graphType.startsWith("episode:") : state.graphType === type;
        button.classList.toggle("active", active);
      }
    }

    function setGraphType(type) {
      if (type === "episode") {
        state.graphType = els.episodeSelect.value || "all";
      } else {
        state.graphType = type;
      }
      updateFlowButtons();
      renderGraph();
    }

    function rebuildIndexes() {
      state.originalNodes = new Map();
      state.workingNodes = new Map();
      state.inbound = new Map();
      state.outgoing = new Map();
      state.issues = [];

      for (const node of getNodes(state.originalScript)) {
        if (node && node.id) state.originalNodes.set(node.id, node);
      }
      for (const node of getNodes(state.workingScript)) {
        if (node && node.id) state.workingNodes.set(node.id, node);
      }

      for (const node of getNodes(state.workingScript)) {
        const out = [];
        const choices = Array.isArray(node.choices) ? node.choices : [];
        for (const choice of choices) {
          if (!choice.next) continue;
          out.push(choice.next);
          if (!state.inbound.has(choice.next)) state.inbound.set(choice.next, []);
          state.inbound.get(choice.next).push(node.id);
          if (!state.workingNodes.has(choice.next) && !isSpecialTarget(choice.next)) {
            state.issues.push({
              type: "missing",
              node: node.id,
              text: node.id + " links to missing node " + choice.next
            });
          }
        }
        state.outgoing.set(node.id, out);
      }

      const starts = new Set([
        state.workingScript && state.workingScript.intro_node,
        state.workingScript && state.workingScript.fallback_id
      ].filter(Boolean));
      if (Array.isArray(state.workingScript && state.workingScript.episodes)) {
        for (const ep of state.workingScript.episodes) {
          if (ep.start_node) starts.add(ep.start_node);
        }
      }
      for (const node of getNodes(state.workingScript)) {
        const inbound = state.inbound.get(node.id) || [];
        if (inbound.length === 0 && !starts.has(node.id)) {
          state.issues.push({
            type: "orphan",
            node: node.id,
            text: node.id + " is not reached by another node"
          });
        }
      }

      syncChanges();
    }

    function syncChanges() {
      state.changes.clear();
      for (const node of getNodes(state.workingScript)) {
        const original = state.originalNodes.get(node.id);
        if (!original) {
          state.changes.set(node.id, ["new node"]);
          continue;
        }
        const fields = [];
        if (JSON.stringify(original.line || "") !== JSON.stringify(node.line || "")) fields.push("line");
        if (JSON.stringify(original.choices || []) !== JSON.stringify(node.choices || [])) fields.push("choices");
        if (JSON.stringify(original.unlock || null) !== JSON.stringify(node.unlock || null)) fields.push("unlock");
        if (JSON.stringify(original.tags || []) !== JSON.stringify(node.tags || [])) fields.push("tags");
        if (JSON.stringify(original.speaker || "") !== JSON.stringify(node.speaker || "")) fields.push("speaker");
        if (JSON.stringify(original.set_flags || null) !== JSON.stringify(node.set_flags || null)) fields.push("set_flags");
        if (JSON.stringify(original.set_flag || null) !== JSON.stringify(node.set_flag || null)) fields.push("set_flag");
        if (fields.length > 0) state.changes.set(node.id, fields);
      }
      for (const [nodeId, comment] of state.comments.entries()) {
        if (comment.trim() && !state.changes.has(nodeId)) state.changes.set(nodeId, ["comment"]);
      }
    }

    function setScriptData(script, sourceName) {
      if (!script || !Array.isArray(script.nodes)) {
        alert("This file does not look like scripted_nodes.json. It needs a top-level nodes array.");
        return;
      }
      state.sourceName = sourceName || "scripted_nodes.json";
      state.originalScript = clone(script);
      state.workingScript = clone(script);
      state.selectedId = script.intro_node || (script.nodes[0] && script.nodes[0].id) || "";
      state.comments.clear();
      rebuildIndexes();
      renderAll();
    }

    function setReactiveData(data, sourceName) {
      state.reactiveLines = data;
      state.reactiveSourceName = sourceName || "reactive_lines.json";
      renderStatus();
    }

    async function loadJsonFile(file, callback) {
      if (!file) return;
      try {
        const text = await file.text();
        callback(JSON.parse(text), file.name);
      } catch (error) {
        alert("Could not read this JSON file.\n\nMost likely causes:\n- a smart quote was pasted into a property name\n- a dialogue line contains unescaped quotes\n- a comma is missing between fields\n\nDetails: " + error.message);
      }
    }

    async function tryRepoAutoLoad() {
      const candidates = [
        "../../data/dialogue/scripted_nodes.json",
        "data/dialogue/scripted_nodes.json",
        "../data/dialogue/scripted_nodes.json"
      ];
      let lastError = "";
      for (const url of candidates) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) continue;
          const data = await response.json();
          setScriptData(data, url);
          tryRepoReactiveLoad();
          return;
        } catch (error) {
          lastError = error.message;
          continue;
        }
      }
      alert("Auto-load did not work from this browser.\n\nUse Load scripted_nodes.json instead. If that also fails, the script file is probably invalid JSON.\n\nDetails: " + (lastError || "No candidate file loaded."));
    }

    async function tryRepoReactiveLoad() {
      const candidates = [
        "../../data/dialogue/reactive_lines.json",
        "data/dialogue/reactive_lines.json",
        "../data/dialogue/reactive_lines.json"
      ];
      for (const url of candidates) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          if (!response.ok) continue;
          setReactiveData(await response.json(), url);
          return;
        } catch (error) {
          continue;
        }
      }
    }

    function renderAll() {
      renderStatus();
      renderGraphTypeOptions();
      renderWarnings();
      renderNodeList();
      renderGraph();
      renderDetails();
    }

    function renderStatus() {
      const nodeCount = getNodes(state.workingScript).length;
      let linkCount = 0;
      let unlockCount = 0;
      for (const node of getNodes(state.workingScript)) {
        linkCount += Array.isArray(node.choices) ? node.choices.filter(choice => choice.next).length : 0;
        if (node.unlock) unlockCount += 1;
      }
      els.statNodes.textContent = String(nodeCount);
      els.statLinks.textContent = String(linkCount);
      els.statUnlocks.textContent = String(unlockCount);
      els.statIssues.textContent = String(state.issues.length);

      const pieces = [];
      if (state.sourceName) pieces.push(state.sourceName);
      if (state.reactiveSourceName) pieces.push("reactive: " + state.reactiveSourceName);
      if (state.changes.size > 0) pieces.push(state.changes.size + " changed");
      els.fileStatus.textContent = pieces.length > 0 ? pieces.join(" | ") : "No script loaded";
    }

    function renderWarnings() {
      els.warningList.innerHTML = "";
      for (const issue of state.issues.slice(0, 8)) {
        const div = document.createElement("div");
        div.className = "warning-item";
        div.textContent = issue.text;
        div.addEventListener("click", () => selectNode(issue.node));
        els.warningList.appendChild(div);
      }
    }

    function passesFilter(node) {
      const filter = els.filterSelect.value;
      const issuesForNode = state.issues.filter(issue => issue.node === node.id);
      if (filter === "unlock") return Boolean(node.unlock);
      if (filter === "flags") return Boolean(node.set_flag || node.set_flags);
      if (filter === "missing") return issuesForNode.some(issue => issue.type === "missing");
      if (filter === "orphan") return issuesForNode.some(issue => issue.type === "orphan");
      if (filter === "ai") return (state.outgoing.get(node.id) || []).some(isSpecialTarget);
      if (filter === "changed") return state.changes.has(node.id);
      return true;
    }

    function renderNodeList() {
      els.nodeList.innerHTML = "";
      if (!state.workingScript) return;
      const q = els.searchInput.value.trim().toLowerCase();
      const nodes = getNodes(state.workingScript).filter(node => {
        if (!passesFilter(node)) return false;
        if (!q) return true;
        return nodeSearchHaystack(node).includes(q);
      });

      for (const node of nodes) {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "node-row" + (node.id === state.selectedId ? " active" : "");
        row.addEventListener("click", () => selectNode(node.id));

        const id = document.createElement("div");
        id.className = "node-id";
        id.textContent = nodeLabel(node);
        row.appendChild(id);

        const preview = document.createElement("div");
        preview.className = "node-line-preview";
        preview.textContent = oneLine(node.line).slice(0, 180);
        row.appendChild(preview);

        const tags = document.createElement("div");
        tags.className = "tags";
        if (node.unlock) tags.appendChild(tag("unlock", "unlock"));
        if (describeFlags(node)) tags.appendChild(tag("flags", "flag"));
        if (state.changes.has(node.id)) tags.appendChild(tag("changed", "flag"));
        const issue = state.issues.find(item => item.node === node.id);
        if (issue) tags.appendChild(tag(issue.type, issue.type === "missing" ? "bad" : "warn"));
        if (Array.isArray(node.tags)) {
          for (const item of node.tags.slice(0, 3)) tags.appendChild(tag(item));
        }
        row.appendChild(tags);
        els.nodeList.appendChild(row);
      }
    }

    function tag(text, kind) {
      const span = document.createElement("span");
      span.className = "tag" + (kind ? " " + kind : "");
      span.textContent = text;
      return span;
    }

    function selectNode(id) {
      state.selectedId = id;
      renderNodeList();
      renderGraph();
      renderDetails();
    }

    function renderGraph() {
      if (!state.workingScript) {
        els.graphFrame.innerHTML = '<div class="empty">Load `data/dialogue/scripted_nodes.json` to see the conversation map.</div>';
        return;
      }

      const nodes = getNodes(state.workingScript).filter(passesGraphType);
      const visibleIds = new Set(nodes.map(node => node.id));
      const graphItems = [];
      const itemById = new Map();
      const graphEdges = [];

      function addItem(item) {
        if (itemById.has(item.id)) return itemById.get(item.id);
        itemById.set(item.id, item);
        graphItems.push(item);
        return item;
      }

      for (const node of nodes) {
        addItem({
          id: node.id,
          node,
          kind: "dialogue",
          role: hasChoiceInbound(node.id) ? "Yua response" : "Yua line",
          title: node.id,
          preview: oneLine(node.line),
          width: 0,
          height: 0
        });
      }

      for (const node of nodes) {
        const choices = Array.isArray(node.choices) ? node.choices : [];
        choices.forEach((choice, index) => {
          const choiceId = "choice:" + node.id + ":" + index;
          addItem({
            id: choiceId,
            sourceId: node.id,
            targetId: choice.next || "",
            kind: "choice",
            role: "Player option",
            title: "Option " + (index + 1),
            preview: oneLine(choice.text),
            width: 0,
            height: 0
          });
          graphEdges.push({ from: node.id, to: choiceId, choice: true });

          if (choice.next) {
            if (!itemById.has(choice.next)) {
              addItem({
                id: choice.next,
                node: { id: choice.next, line: state.workingNodes.has(choice.next) ? "outside this flow type" : "special target" },
                kind: "target",
                role: state.workingNodes.has(choice.next) ? "Outside filter" : isSpecialTarget(choice.next) ? "Action / AI" : "Missing target",
                title: choice.next,
                preview: state.workingNodes.has(choice.next) ? "This response is in another flow filter." : isSpecialTarget(choice.next) ? "This is a game action or AI mode." : "This target does not exist in the script.",
                special: isSpecialTarget(choice.next),
                outside: state.workingNodes.has(choice.next),
                missing: !state.workingNodes.has(choice.next) && !isSpecialTarget(choice.next),
                width: 0,
                height: 0
              });
            }
            graphEdges.push({ from: choiceId, to: choice.next, response: true });
          }
        });
      }

      if (graphItems.length === 0) {
        els.graphFrame.innerHTML = '<div class="empty">No nodes match this flow type.</div>';
        return;
      }

      for (const item of graphItems) {
        const size = measureGraphCard(item);
        item.width = size.width;
        item.height = size.height;
      }

      const layout = buildLayeredGraphLayout(graphItems, graphEdges, visibleIds);
      const positions = layout.positions;
      const width = layout.width;
      const height = layout.height;

      const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
      svg.setAttribute("width", String(width));
      svg.setAttribute("height", String(height));
      svg.setAttribute("viewBox", "0 0 " + width + " " + height);

      const defs = document.createElementNS(svg.namespaceURI, "defs");
      defs.innerHTML = '<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9e8e7f"></path></marker>';
      svg.appendChild(defs);

      for (const edge of graphEdges) {
        const from = positions.get(edge.from);
        const to = positions.get(edge.to);
        const fromItem = itemById.get(edge.from);
        const toItem = itemById.get(edge.to);
        if (!from || !to || !fromItem || !toItem) continue;
        const path = document.createElementNS(svg.namespaceURI, "path");
        const x1 = from.x + fromItem.width / 2;
        const y1 = from.y + fromItem.height;
        const x2 = to.x + toItem.width / 2;
        const y2 = to.y;
        const mid = (y1 + y2) / 2;
        path.setAttribute("d", "M " + x1 + " " + y1 + " C " + x1 + " " + mid + ", " + x2 + " " + mid + ", " + x2 + " " + y2);
        path.setAttribute("class", "edge" + (toItem.special ? " special" : ""));
        svg.appendChild(path);
      }

      for (const item of layout.order) {
        const pos = positions.get(item.id);
        const group = document.createElementNS(svg.namespaceURI, "g");
        group.setAttribute("class", "graph-node " + item.kind + (item.id === state.selectedId ? " active" : "") + (item.missing ? " missing" : "") + (item.outside ? " outside" : ""));
        group.setAttribute("transform", "translate(" + pos.x + " " + pos.y + ")");
        group.setAttribute("tabindex", "0");
        group.style.cursor = item.kind === "dialogue" ? "pointer" : "default";
        group.addEventListener("click", () => {
          if (item.kind === "dialogue" && state.workingNodes.has(item.id)) selectNode(item.id);
        });

        appendGraphCard(group, item, item.width, item.height);
        svg.appendChild(group);
      }

      els.graphFrame.innerHTML = "";
      els.graphFrame.appendChild(svg);
    }

    function getVerticalGraphOrder(nodes, graphNodes) {
      const graphItems = new Map(graphNodes.map(item => [item.id, item]));
      const visibleIds = new Set(nodes.map(node => node.id));
      const visited = new Set();
      const ordered = [];
      const starts = new Set([
        state.workingScript && state.workingScript.intro_node,
        state.workingScript && state.workingScript.fallback_id
      ].filter(Boolean));
      if (Array.isArray(state.workingScript && state.workingScript.episodes)) {
        for (const ep of state.workingScript.episodes) {
          if (ep.start_node) starts.add(ep.start_node);
        }
      }

      const rootNodes = nodes.filter(node => {
        const inbound = (state.inbound.get(node.id) || []).filter(id => visibleIds.has(id));
        return inbound.length === 0;
      });
      rootNodes.sort((a, b) => {
        const aStart = starts.has(a.id) ? 0 : 1;
        const bStart = starts.has(b.id) ? 0 : 1;
        return aStart - bStart;
      });

      function visit(id) {
        if (visited.has(id) || !graphItems.has(id)) return;
        visited.add(id);
        ordered.push(graphItems.get(id));
        for (const next of state.outgoing.get(id) || []) {
          if (graphItems.has(next)) visit(next);
        }
      }

      for (const node of rootNodes) visit(node.id);
      for (const item of graphNodes) visit(item.id);
      return ordered;
    }

    function hasChoiceInbound(nodeId) {
      for (const node of getNodes(state.workingScript)) {
        const choices = Array.isArray(node.choices) ? node.choices : [];
        if (choices.some(choice => choice.next === nodeId)) return true;
      }
      return false;
    }

    function textUnits(text) {
      let units = 0;
      for (const char of String(text || "")) {
        units += char.charCodeAt(0) > 255 ? 2 : 1;
      }
      return units;
    }

    function measureGraphCard(item) {
      const previewUnits = textUnits(item.preview);
      const titleUnits = textUnits(item.title);
      const baseWidth = item.kind === "choice" ? 220 : 280;
      const width = Math.min(460, Math.max(baseWidth, 190 + Math.min(96, Math.max(previewUnits, titleUnits)) * 2.5));
      const unitsPerLine = Math.max(20, Math.floor((width - 26) / 7));
      const previewLines = Math.max(1, Math.ceil(previewUnits / unitsPerLine));
      const titleLines = Math.max(1, Math.ceil(titleUnits / unitsPerLine));
      const height = Math.max(86, 42 + titleLines * 17 + previewLines * 17);
      return { width: Math.ceil(width), height: Math.ceil(height) };
    }

    function buildLayeredGraphLayout(items, edges, visibleIds) {
      const itemById = new Map(items.map(item => [item.id, item]));
      const inbound = new Map(items.map(item => [item.id, 0]));
      for (const edge of edges) {
        if (inbound.has(edge.to)) inbound.set(edge.to, inbound.get(edge.to) + 1);
      }

      const starts = new Set([
        state.workingScript && state.workingScript.intro_node,
        state.workingScript && state.workingScript.fallback_id
      ].filter(Boolean));
      if (Array.isArray(state.workingScript && state.workingScript.episodes)) {
        for (const ep of state.workingScript.episodes) {
          if (ep.start_node) starts.add(ep.start_node);
        }
      }

      const roots = items.filter(item => inbound.get(item.id) === 0);
      roots.sort((a, b) => {
        const aStart = starts.has(a.id) ? 0 : 1;
        const bStart = starts.has(b.id) ? 0 : 1;
        return aStart - bStart;
      });

      const edgesBySource = new Map();
      for (const edge of edges) {
        if (!edgesBySource.has(edge.from)) edgesBySource.set(edge.from, []);
        edgesBySource.get(edge.from).push(edge);
      }

      const depth = new Map();
      const queue = roots.length > 0 ? [...roots] : [...items];
      for (const root of queue) depth.set(root.id, 0);
      for (let index = 0; index < queue.length; index += 1) {
        const item = queue[index];
        const currentDepth = depth.get(item.id) || 0;
        for (const edge of edgesBySource.get(item.id) || []) {
          if (!depth.has(edge.to)) {
            depth.set(edge.to, currentDepth + 1);
            const nextItem = itemById.get(edge.to);
            if (nextItem) queue.push(nextItem);
          }
        }
      }
      for (const item of items) {
        if (!depth.has(item.id)) depth.set(item.id, 0);
      }

      const rows = new Map();
      for (const item of items) {
        const itemDepth = depth.get(item.id) || 0;
        if (!rows.has(itemDepth)) rows.set(itemDepth, []);
        rows.get(itemDepth).push(item);
      }

      const gapX = 48;
      const gapY = 58;
      let maxRowWidth = 0;
      const rowHeights = new Map();
      for (const [row, rowItems] of rows.entries()) {
        const rowWidth = rowItems.reduce((total, item) => total + item.width, 0) + Math.max(0, rowItems.length - 1) * gapX;
        maxRowWidth = Math.max(maxRowWidth, rowWidth);
        rowHeights.set(row, Math.max(...rowItems.map(item => item.height)));
      }

      const width = Math.max(860, maxRowWidth + 120);
      const positions = new Map();
      const order = [];
      let y = 40;
      const orderedRows = Array.from(rows.keys()).sort((a, b) => a - b);
      for (const row of orderedRows) {
        const rowItems = rows.get(row);
        const rowWidth = rowItems.reduce((total, item) => total + item.width, 0) + Math.max(0, rowItems.length - 1) * gapX;
        let x = Math.max(60, (width - rowWidth) / 2);
        for (const item of rowItems) {
          positions.set(item.id, { x, y });
          order.push(item);
          x += item.width + gapX;
        }
        y += rowHeights.get(row) + gapY;
      }

      return { positions, order, width, height: Math.max(480, y + 20) };
    }

    function appendGraphCard(group, item, width, height) {
      const foreign = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
      foreign.setAttribute("width", String(width));
      foreign.setAttribute("height", String(height));

      const card = document.createElementNS("http://www.w3.org/1999/xhtml", "div");
      card.setAttribute("class", "graph-card");

      const kickerEl = document.createElementNS("http://www.w3.org/1999/xhtml", "div");
      kickerEl.setAttribute("class", "graph-card-kicker");
      kickerEl.textContent = item.role;
      card.appendChild(kickerEl);

      const titleEl = document.createElementNS("http://www.w3.org/1999/xhtml", "div");
      titleEl.setAttribute("class", "graph-card-title");
      titleEl.textContent = item.title;
      card.appendChild(titleEl);

      const previewEl = document.createElementNS("http://www.w3.org/1999/xhtml", "div");
      previewEl.setAttribute("class", "graph-card-preview");
      previewEl.textContent = item.preview;
      card.appendChild(previewEl);

      foreign.appendChild(card);
      group.appendChild(foreign);
    }

    function renderDetails() {
      els.detailPane.innerHTML = "";
      if (!state.workingScript) {
        els.detailPane.innerHTML = '<div class="empty">Select a node to inspect line text, choices, unlock gates, flags, and review changes.</div>';
        return;
      }
      const node = state.workingNodes.get(state.selectedId);
      if (!node) {
        els.detailPane.innerHTML = '<div class="empty">This target is an action, AI mode, exit, or missing node.</div>';
        return;
      }
      const original = state.originalNodes.get(node.id) || {};

      const header = document.createElement("div");
      header.className = "field-grid";
      header.appendChild(readonlyField("Node ID", node.id));
      header.appendChild(editableText("Speaker", node.speaker || "", value => {
        node.speaker = value.trim();
        afterNodeEdit();
      }));
      els.detailPane.appendChild(header);

      if (state.reviewMode) {
        els.detailPane.appendChild(editableArea("Line", cleanText(node.line), value => {
          node.line = value;
          afterNodeEdit();
        }));
      } else {
        const wrap = document.createElement("div");
        wrap.appendChild(label("Line"));
        const line = document.createElement("div");
        line.className = "readonly-line";
        line.textContent = cleanText(node.line);
        wrap.appendChild(line);
        els.detailPane.appendChild(wrap);
      }

      if (state.compareMode && state.changes.has(node.id)) {
        const compare = document.createElement("div");
        compare.className = "compare";
        compare.appendChild(compareBox("Original", original.line || ""));
        compare.appendChild(compareBox("Edited", node.line || ""));
        els.detailPane.appendChild(compare);
      }

      const meta = document.createElement("div");
      meta.className = "field-grid";
      meta.appendChild(jsonField("Unlock", node.unlock, value => {
        node.unlock = value;
        afterNodeEdit();
      }));
      meta.appendChild(jsonField("Tags", node.tags || [], value => {
        node.tags = Array.isArray(value) ? value : [];
        afterNodeEdit();
      }));
      meta.appendChild(jsonField("Set flags", node.set_flags || node.set_flag || null, value => {
        delete node.set_flags;
        delete node.set_flag;
        if (Array.isArray(value)) node.set_flags = value;
        else if (value && typeof value === "object") node.set_flag = value;
        afterNodeEdit();
      }));
      meta.appendChild(readonlyField("Inbound from", (state.inbound.get(node.id) || []).join(", ") || "intro/fallback/none"));
      els.detailPane.appendChild(meta);

      els.detailPane.appendChild(choiceEditor(node));
      els.detailPane.appendChild(reviewEditor(node));
    }

    function label(text) {
      const el = document.createElement("label");
      el.textContent = text;
      return el;
    }

    function readonlyField(name, value) {
      const wrap = document.createElement("div");
      wrap.appendChild(label(name));
      const box = document.createElement("div");
      box.className = "readonly-line";
      box.style.minHeight = "42px";
      box.textContent = String(value || "");
      wrap.appendChild(box);
      return wrap;
    }

    function editableText(name, value, onChange) {
      const wrap = document.createElement("div");
      wrap.appendChild(label(name));
      const input = document.createElement("input");
      input.type = "text";
      input.value = value;
      input.disabled = !state.reviewMode;
      input.addEventListener("input", () => onChange(input.value));
      input.addEventListener("change", renderDetails);
      input.addEventListener("blur", renderDetails);
      wrap.appendChild(input);
      return wrap;
    }

    function editableArea(name, value, onChange) {
      const wrap = document.createElement("div");
      wrap.appendChild(label(name));
      const area = document.createElement("textarea");
      area.value = value;
      area.disabled = !state.reviewMode;
      area.addEventListener("input", () => onChange(area.value));
      area.addEventListener("change", renderDetails);
      area.addEventListener("blur", renderDetails);
      wrap.appendChild(area);
      return wrap;
    }

    function compareBox(name, value) {
      const wrap = document.createElement("div");
      wrap.appendChild(label(name));
      const pre = document.createElement("pre");
      pre.textContent = cleanText(value);
      wrap.appendChild(pre);
      return wrap;
    }

    function jsonField(name, value, onChange) {
      const wrap = document.createElement("div");
      wrap.appendChild(label(name));
      const area = document.createElement("textarea");
      area.value = value === undefined || value === null ? "" : JSON.stringify(value, null, 2);
      area.disabled = !state.reviewMode;
      area.addEventListener("change", () => {
        const text = area.value.trim();
        try {
          onChange(text ? JSON.parse(text) : null);
          area.style.borderColor = "";
        } catch (error) {
          area.style.borderColor = "var(--bad)";
          alert(name + " must be valid JSON.");
        }
      });
      wrap.appendChild(area);
      return wrap;
    }

    function choiceEditor(node) {
      const wrap = document.createElement("div");
      wrap.appendChild(label("Choices"));
      const table = document.createElement("div");
      table.className = "choice-table";
      const choices = Array.isArray(node.choices) ? node.choices : [];
      choices.forEach((choice, index) => {
        const originalChoice = ((state.originalNodes.get(node.id) || {}).choices || [])[index] || {};
        const row = document.createElement("div");
        row.className = "choice-row" + (JSON.stringify(choice) !== JSON.stringify(originalChoice) ? " changed" : "");

        const fields = document.createElement("div");
        fields.className = "inline-fields";
        fields.appendChild(editableText("Button text", choice.text || "", value => {
          choice.text = value;
          afterNodeEdit();
        }));
        fields.appendChild(editableText("Next target", choice.next || "", value => {
          choice.next = value.trim();
          afterNodeEdit();
        }));
        row.appendChild(fields);

        const actions = document.createElement("div");
        actions.className = "mini-actions";
        const jump = document.createElement("button");
        jump.type = "button";
        jump.textContent = "Jump";
        jump.disabled = !choice.next || !state.workingNodes.has(choice.next);
        jump.addEventListener("click", () => selectNode(choice.next));
        actions.appendChild(jump);

        const remove = document.createElement("button");
        remove.type = "button";
        remove.className = "danger";
        remove.textContent = "Remove";
        remove.disabled = !state.reviewMode;
        remove.addEventListener("click", () => {
          choices.splice(index, 1);
          node.choices = choices;
          afterNodeEdit(true);
        });
        actions.appendChild(remove);
        row.appendChild(actions);
        table.appendChild(row);
      });

      const add = document.createElement("button");
      add.type = "button";
      add.textContent = "Add choice";
      add.disabled = !state.reviewMode;
      add.addEventListener("click", () => {
        if (!Array.isArray(node.choices)) node.choices = [];
        node.choices.push({ text: "New choice", next: "" });
        afterNodeEdit(true);
      });

      wrap.appendChild(table);
      wrap.appendChild(add);
      return wrap;
    }

    function reviewEditor(node) {
      const panel = document.createElement("div");
      panel.className = "review-panel";
      panel.appendChild(label("Review comment"));
      const area = document.createElement("textarea");
      area.placeholder = "Friend note, suggested rewrite, confusion, or approval.";
      area.value = state.comments.get(node.id) || "";
      area.addEventListener("input", () => {
        if (area.value.trim()) state.comments.set(node.id, area.value);
        else state.comments.delete(node.id);
        afterNodeEdit(false);
      });
      area.addEventListener("change", renderDetails);
      area.addEventListener("blur", renderDetails);
      panel.appendChild(area);

      const changes = document.createElement("div");
      changes.className = "changes";
      for (const [nodeId, fields] of state.changes.entries()) {
        const item = document.createElement("button");
        item.type = "button";
        item.className = "change";
        item.innerHTML = "<strong></strong><span></span>";
        item.querySelector("strong").textContent = nodeId;
        item.querySelector("span").textContent = fields.join(", ");
        item.addEventListener("click", () => selectNode(nodeId));
        changes.appendChild(item);
      }
      if (state.changes.size === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No tracked edits or comments yet.";
        changes.appendChild(empty);
      }
      panel.appendChild(changes);
      return panel;
    }

    function afterNodeEdit(fullRender) {
      rebuildIndexes();
      renderStatus();
      renderWarnings();
      renderNodeList();
      renderGraphTypeOptions();
      if (fullRender) renderDetails();
      renderGraph();
    }

    function revertSelectedNode() {
      const original = state.originalNodes.get(state.selectedId);
      if (!original || !state.workingScript) return;
      const nodes = getNodes(state.workingScript);
      const index = nodes.findIndex(node => node.id === state.selectedId);
      if (index >= 0) nodes[index] = clone(original);
      state.comments.delete(state.selectedId);
      rebuildIndexes();
      renderAll();
    }

    function clearReviewChanges() {
      if (!state.originalScript) return;
      if (!confirm("Clear all review edits and comments?")) return;
      state.workingScript = clone(state.originalScript);
      state.comments.clear();
      rebuildIndexes();
      renderAll();
    }

    function downloadText(filename, mime, text) {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      if (!state.workingScript) return alert("Load a script first.");
      downloadText("scripted_nodes.reviewed.json", "application/json", JSON.stringify(state.workingScript, null, 2));
    }

    function exportNotes() {
      if (!state.workingScript) return alert("Load a script first.");
      const lines = [];
      lines.push("# Project Chill Dialogue Review");
      lines.push("");
      lines.push("- Source: " + (state.sourceName || "unknown"));
      lines.push("- Nodes: " + getNodes(state.workingScript).length);
      lines.push("- Changed/commented nodes: " + state.changes.size);
      lines.push("");
      if (state.issues.length) {
        lines.push("## Flow Issues");
        for (const issue of state.issues) lines.push("- " + issue.text);
        lines.push("");
      }
      lines.push("## Review Changes");
      for (const [nodeId, fields] of state.changes.entries()) {
        const node = state.workingNodes.get(nodeId);
        const original = state.originalNodes.get(nodeId) || {};
        lines.push("### " + nodeId);
        lines.push("- Fields: " + fields.join(", "));
        if (state.comments.get(nodeId)) lines.push("- Comment: " + state.comments.get(nodeId).replace(/\n/g, " "));
        if (fields.includes("line")) {
          lines.push("");
          lines.push("Original:");
          lines.push("```");
          lines.push(cleanText(original.line || ""));
          lines.push("```");
          lines.push("Edited:");
          lines.push("```");
          lines.push(cleanText((node && node.line) || ""));
          lines.push("```");
        }
        lines.push("");
      }
      downloadText("dialogue_review_notes.md", "text/markdown", lines.join("\n"));
    }

    function exportSnapshot() {
      if (!state.workingScript) return alert("Load a script first.");
      const cloneDoc = document.documentElement.cloneNode(true);
      const scripted = cloneDoc.querySelector("#embedded-scripted");
      const reactive = cloneDoc.querySelector("#embedded-reactive");
      scripted.textContent = JSON.stringify(state.workingScript);
      reactive.textContent = state.reactiveLines ? JSON.stringify(state.reactiveLines) : "";
      const html = "<!doctype html>\n" + cloneDoc.outerHTML;
      downloadText("dialogue_viewer_snapshot.html", "text/html", html);
    }

    function buildMermaid() {
      if (!state.workingScript) return "";
      const lines = ["flowchart TD"];
      const nodes = getNodes(state.workingScript).filter(passesGraphType);
      for (const node of nodes) {
        const safeId = node.id.replace(/[^A-Za-z0-9_]/g, "_");
        lines.push("  " + safeId + "[\"" + node.id.replace(/"/g, "'") + "\"]");
        for (const choice of Array.isArray(node.choices) ? node.choices : []) {
          if (!choice.next) continue;
          const targetId = choice.next.replace(/[^A-Za-z0-9_]/g, "_");
          lines.push("  " + safeId + " -->|\"" + String(choice.text || "").replace(/"/g, "'") + "\"| " + targetId);
        }
      }
      return lines.join("\n");
    }

    async function copyMermaid() {
      const text = buildMermaid();
      if (!text) return alert("Load a script first.");
      try {
        await navigator.clipboard.writeText(text);
        alert("Mermaid flowchart copied.");
      } catch (error) {
        downloadText("dialogue_flowchart.mmd", "text/plain", text);
      }
    }

    function fitGraph() {
      els.graphFrame.scrollTo({ left: 0, top: 0, behavior: "smooth" });
    }

    function loadEmbeddedIfPresent() {
      const scriptedText = document.getElementById("embedded-scripted").textContent.trim();
      const reactiveText = document.getElementById("embedded-reactive").textContent.trim();
      if (scriptedText) {
        try {
          setScriptData(JSON.parse(scriptedText), "embedded snapshot");
        } catch (error) {
          console.warn(error);
        }
      }
      if (reactiveText) {
        try {
          setReactiveData(JSON.parse(reactiveText), "embedded snapshot");
        } catch (error) {
          console.warn(error);
        }
      }
    }

    els.loadScriptButton.addEventListener("click", () => els.scriptFileInput.click());
    els.loadReactiveButton.addEventListener("click", () => els.reactiveFileInput.click());
    els.scriptFileInput.addEventListener("change", () => loadJsonFile(els.scriptFileInput.files[0], setScriptData));
    els.reactiveFileInput.addEventListener("change", () => loadJsonFile(els.reactiveFileInput.files[0], setReactiveData));
    els.tryRepoButton.addEventListener("click", tryRepoAutoLoad);
    els.reviewModeToggle.addEventListener("change", () => {
      state.reviewMode = els.reviewModeToggle.checked;
      renderDetails();
    });
    els.compareToggle.addEventListener("change", () => {
      state.compareMode = els.compareToggle.checked;
      renderDetails();
    });
    els.searchInput.addEventListener("input", renderNodeList);
    els.filterSelect.addEventListener("change", renderNodeList);
    els.flowTabs.addEventListener("click", event => {
      const button = event.target.closest("button[data-flow-type]");
      if (!button || button.disabled) return;
      setGraphType(button.dataset.flowType);
    });
    els.episodeSelect.addEventListener("change", () => {
      setGraphType("episode");
    });
    els.exportJsonButton.addEventListener("click", exportJson);
    els.exportNotesButton.addEventListener("click", exportNotes);
    els.exportSnapshotButton.addEventListener("click", exportSnapshot);
    els.clearChangesButton.addEventListener("click", clearReviewChanges);
    els.revertNodeButton.addEventListener("click", revertSelectedNode);
    els.fitGraphButton.addEventListener("click", fitGraph);
    els.copyMermaidButton.addEventListener("click", copyMermaid);

    loadEmbeddedIfPresent();
  </script>
</body>
</html>
